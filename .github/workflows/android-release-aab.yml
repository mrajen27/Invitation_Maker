name: Build Signed Release AAB

"on":
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-release-aab:
    name: Build release App Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release AAB
        id: build
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            if [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ]; then
              echo "::error::ANDROID_KEYSTORE_BASE64 is set but ANDROID_KEYSTORE_PASSWORD and/or ANDROID_KEY_ALIAS are missing."
              exit 1
            fi
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
            export ANDROID_KEYSTORE_PATH=release.keystore
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "Signed release build using repository secrets." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Signing secrets are not configured. Building an unsigned release AAB for validation only."
            echo "Unsigned release build. Add \`ANDROID_KEYSTORE_BASE64\`, \`ANDROID_KEYSTORE_PASSWORD\`, and \`ANDROID_KEY_ALIAS\` repository secrets to produce a Play Store upload bundle." >> "$GITHUB_STEP_SUMMARY"
          fi

          ./gradlew bundleRelease --stacktrace

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: vaanga-invite-${{ steps.build.outputs.signed == 'true' && 'signed' || 'unsigned' }}-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
